version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bsap
      POSTGRES_USER: bsap
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsap"]
  
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
  
  opensearch:
    image: opensearchproject/opensearch:2
  
  rust-scanner:
    build:
      context: ../../rust
      dockerfile: ../infra/docker/Dockerfile.rust
    depends_on:
      - postgres
  
  dotnet-api:
    build: ../../dotnet
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - postgres
      - redis
  
  nodejs-dashboard:
    build: ../../nodejs/dashboard
    ports:
      - "3000:3000"

volumes:
  postgres_data:
